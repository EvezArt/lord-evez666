name: Revenue Spine Receiver
on:
  repository_dispatch:
    types: [revenue_bridge_signal]

jobs:
  append-spine:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Append revenue event to spine
        run: |
          mkdir -p spine/revenue
          EVENT='${{ toJson(github.event.client_payload) }}'
          TIMESTAMP=$(echo "$EVENT" | jq -r '.timestamp // now')
          HASH=$(echo "$EVENT" | sha256sum | cut -d' ' -f1)
          
          PREV_HASH="genesis"
          if [ -f spine/revenue/spine.jsonl ]; then
            PREV_HASH=$(tail -1 spine/revenue/spine.jsonl | jq -r '.hash // "genesis"')
          fi
          
          CHAINED=$(echo "$EVENT" | jq --arg ph "$PREV_HASH" --arg h "$HASH" \
            '. + {predecessor: $ph, hash: $h}')
          
          echo "$CHAINED" >> spine/revenue/spine.jsonl
          echo "Appended revenue event: $HASH"
          
      - name: Commit spine
        run: |
          git config user.name "Viktor"
          git config user.email "evezart@users.noreply.github.com"
          git add spine/revenue/spine.jsonl
          git diff --staged --quiet || git commit -m "spine: revenue bridge event [auto]"
          git push

      - name: Verify
        run: |
          echo "Spine events:"
          cat spine/revenue/spine.jsonl | jq -c '{hash: .hash, predecessor: .predecessor}'
